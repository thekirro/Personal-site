<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kry Luk – Portfolio</title>
  <meta name="description" content="Kry Luk – [YOUR TAGLINE]. Portfolio of technology, creativity & personal development." />
  <meta name="keywords" content="Kry Luk, portfolio, developer, AI, technology, spirituality" />
  <meta property="og:title" content="Kry Luk – Portfolio" />
  <meta property="og:description" content="[YOUR TAGLINE PLACEHOLDER]" />
  <meta property="og:image" content="https://picsum.photos/id/1015/1200/630" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://kryluk.example.com" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌌</text></svg>" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />

  <!-- Tailwind v4 CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>

  <!-- AOS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" />
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            display: ['Syne', 'sans-serif'],
            body: ['DM Sans', 'sans-serif'],
          },
          colors: {
            brand: {
              50:  '#eff6ff',
              100: '#dbeafe',
              200: '#bfdbfe',
              300: '#93c5fd',
              400: '#60a5fa',
              500: '#3b82f6',
              600: '#2563eb',
              700: '#1d4ed8',
              800: '#1e40af',
              900: '#1e3a8a',
            }
          }
        }
      }
    }
  </script>

  <style>
    :root {
      --blue-start: #1E40AF;
      --blue-mid:   #3B82F6;
      --cyan:       #06B6D4;
      --purple:     #7C3AED;
      --glow:       rgba(59,130,246,0.35);
    }

    * { box-sizing: border-box; }

    html { font-family: 'DM Sans', sans-serif; }

    body {
      background: #f8fafc;
      color: #1e293b;
      transition: background 0.4s, color 0.4s;
      overflow-x: hidden;
    }

    .dark body, html.dark body {
      background: #080c14;
      color: #e2e8f0;
    }

    /* ─── Glassmorphism ─── */
    .glass {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.18);
    }
    .dark .glass {
      background: rgba(8,12,20,0.55);
      border: 1px solid rgba(255,255,255,0.07);
    }

    /* ─── Gradient text ─── */
    .grad-text {
      background: linear-gradient(135deg, #3B82F6 0%, #06B6D4 50%, #7C3AED 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ─── Gradient button ─── */
    .btn-primary {
      background: linear-gradient(135deg, #1E40AF 0%, #3B82F6 50%, #06B6D4 100%);
      color: #fff;
      border-radius: 50px;
      padding: 0.75rem 2rem;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      letter-spacing: 0.04em;
      transition: all 0.3s ease;
      box-shadow: 0 4px 24px rgba(59,130,246,0.35);
      position: relative;
      overflow: hidden;
    }
    .btn-primary::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, #7C3AED 0%, #3B82F6 100%);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .btn-primary:hover::before { opacity: 1; }
    .btn-primary span { position: relative; z-index: 1; }

    .btn-outline {
      border: 2px solid #3B82F6;
      color: #3B82F6;
      border-radius: 50px;
      padding: 0.75rem 2rem;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      letter-spacing: 0.04em;
      transition: all 0.3s ease;
    }
    .btn-outline:hover {
      background: #3B82F6;
      color: #fff;
      box-shadow: 0 4px 24px rgba(59,130,246,0.4);
    }

    /* ─── Hero canvas ─── */
    #particles-canvas {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    /* ─── Progress bar ─── */
    .progress-track {
      background: rgba(59,130,246,0.1);
      border-radius: 100px;
      height: 8px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 100px;
      background: linear-gradient(90deg, #1E40AF, #3B82F6, #06B6D4);
      width: 0;
      transition: width 1.4s cubic-bezier(0.22, 0.61, 0.36, 1);
      box-shadow: 0 0 8px rgba(59,130,246,0.5);
    }

    /* ─── Timeline ─── */
    .timeline-item::before {
      content: '';
      position: absolute;
      left: -1px; top: 0; bottom: 0;
      width: 2px;
      background: linear-gradient(180deg, #3B82F6, #06B6D4, transparent);
    }

    /* ─── Card hover ─── */
    .card-hover {
      transition: transform 0.35s cubic-bezier(0.22,0.61,0.36,1), box-shadow 0.35s;
    }
    .card-hover:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 20px 60px rgba(59,130,246,0.2);
    }

    /* ─── Masonry grid ─── */
    .masonry {
      columns: 2;
      column-gap: 1rem;
    }
    @media (min-width: 640px)  { .masonry { columns: 3; } }
    @media (min-width: 1024px) { .masonry { columns: 4; } }
    .masonry-item {
      break-inside: avoid;
      margin-bottom: 1rem;
    }

    /* ─── Modal backdrop ─── */
    .modal-backdrop {
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(8px);
    }

    /* ─── Scrollbar ─── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #3B82F6; border-radius: 3px; }

    /* ─── Section heading underline ─── */
    .section-heading::after {
      content: '';
      display: block;
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, #3B82F6, #06B6D4);
      border-radius: 2px;
      margin-top: 0.5rem;
    }

    /* ─── Floating dots BG ─── */
    .dots-bg {
      background-image: radial-gradient(rgba(59,130,246,0.12) 1px, transparent 1px);
      background-size: 28px 28px;
    }

    /* ─── Glow pill ─── */
    .glow-pill {
      box-shadow: 0 0 0 1px rgba(59,130,246,0.3), 0 0 20px rgba(59,130,246,0.15);
    }

    /* ─── Interest card icon glow ─── */
    .icon-glow {
      filter: drop-shadow(0 0 12px rgba(59,130,246,0.6));
    }

    /* ─── Smooth scroll override ─── */
    html { scroll-behavior: smooth; }

    /* ─── Dark overrides ─── */
    .dark .dots-bg {
      background-image: radial-gradient(rgba(59,130,246,0.08) 1px, transparent 1px);
    }

    /* language flag button */
    .lang-btn {
      font-size: 1.25rem;
      line-height: 1;
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
      opacity: 0.6;
    }
    .lang-btn.active { opacity: 1; transform: scale(1.2); }

    /* CD shelf effect */
    .cd-card {
      position: relative;
      overflow: hidden;
      border-radius: 12px;
      cursor: pointer;
    }
    .cd-card img {
      transition: transform 0.5s cubic-bezier(0.22,0.61,0.36,1);
      width: 100%;
      display: block;
    }
    .cd-card:hover img { transform: scale(1.06); }
    .cd-card .cd-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(10,15,30,0.85) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.3s;
      display: flex; align-items: flex-end; padding: 0.75rem;
    }
    .cd-card:hover .cd-overlay { opacity: 1; }

    /* Noise overlay for depth */
    .noise::after {
      content: '';
      position: absolute; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      mix-blend-mode: overlay;
      z-index: 1;
    }
  </style>
</head>

<body
  x-data="app()"
  :class="{ 'dark': darkMode }"
  class="font-body"
>

<!-- ═══════════════════════════════════════════════════
     1. NAVBAR
═══════════════════════════════════════════════════ -->
<nav
  x-data="{ scrolled: false, mobileOpen: false }"
  @scroll.window="scrolled = window.scrollY > 40"
  class="fixed top-0 left-0 right-0 z-50 transition-all duration-500"
  :class="scrolled ? 'glass shadow-lg shadow-blue-900/10 py-2' : 'py-4 bg-transparent'"
>
  <div class="max-w-7xl mx-auto px-6 flex items-center justify-between">

    <!-- Logo -->
    <a href="#hero" class="font-display font-800 text-2xl tracking-tight">
      <span class="grad-text">Kry</span><span class="dark:text-white text-slate-800"> Luk</span>
    </a>

    <!-- Desktop menu -->
    <ul class="hidden md:flex items-center gap-6 font-display text-sm font-600 tracking-wide">
      <template x-for="link in nav.links" :key="link.id">
        <li>
          <a :href="'#'+link.id"
             class="relative dark:text-slate-300 text-slate-600 hover:text-brand-500 transition-colors duration-200 group py-1">
            <span x-text="link[lang]"></span>
            <span class="absolute bottom-0 left-0 h-0.5 w-0 bg-brand-500 transition-all duration-300 group-hover:w-full rounded-full"></span>
          </a>
        </li>
      </template>
    </ul>

    <!-- Controls -->
    <div class="flex items-center gap-3">
      <!-- Language -->
      <button @click="lang = 'pl'" :class="lang==='pl' ? 'active':''" class="lang-btn" title="Polski">🇵🇱</button>
      <button @click="lang = 'en'" :class="lang==='en' ? 'active':''" class="lang-btn" title="English">🇬🇧</button>

      <!-- Dark/Light -->
      <button @click="toggleDark()"
        class="w-10 h-10 rounded-full glass flex items-center justify-center text-lg transition hover:scale-110"
        :title="darkMode ? 'Light mode' : 'Dark mode'">
        <span x-text="darkMode ? '☀️' : '🌙'"></span>
      </button>

      <!-- Mobile hamburger -->
      <button @click="mobileOpen = !mobileOpen" class="md:hidden w-10 h-10 flex flex-col items-center justify-center gap-1.5">
        <span class="block w-6 h-0.5 bg-current transition-all" :class="mobileOpen ? 'rotate-45 translate-y-2' : ''"></span>
        <span class="block w-6 h-0.5 bg-current transition-all" :class="mobileOpen ? 'opacity-0' : ''"></span>
        <span class="block w-6 h-0.5 bg-current transition-all" :class="mobileOpen ? '-rotate-45 -translate-y-2' : ''"></span>
      </button>
    </div>
  </div>

  <!-- Mobile menu -->
  <div x-show="mobileOpen" x-transition:enter="transition ease-out duration-200"
       x-transition:enter-start="opacity-0 -translate-y-4" x-transition:enter-end="opacity-100 translate-y-0"
       x-transition:leave="transition ease-in duration-150" x-transition:leave-end="opacity-0 -translate-y-4"
       class="md:hidden glass mt-2 mx-4 rounded-2xl p-4">
    <template x-for="link in nav.links" :key="link.id">
      <a :href="'#'+link.id" @click="mobileOpen = false"
         class="block py-3 px-4 font-display font-600 text-sm dark:text-slate-200 text-slate-700 hover:text-brand-500 transition-colors border-b border-white/10 last:border-0"
         x-text="link[lang]"></a>
    </template>
  </div>
</nav>


<!-- ═══════════════════════════════════════════════════
     2. HERO
═══════════════════════════════════════════════════ -->
<section id="hero" class="relative min-h-screen flex items-center justify-center overflow-hidden noise">
  <canvas id="particles-canvas"></canvas>

  <!-- Background gradient -->
  <div class="absolute inset-0 bg-gradient-to-br from-slate-950 via-blue-950/80 to-slate-950 z-0"></div>
  <div class="absolute inset-0 bg-gradient-to-tr from-purple-950/30 via-transparent to-cyan-950/20 z-0"></div>

  <!-- Glowing orbs -->
  <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-blue-600/15 rounded-full blur-3xl z-0 animate-pulse"></div>
  <div class="absolute bottom-1/4 right-1/3 w-64 h-64 bg-purple-600/15 rounded-full blur-3xl z-0" style="animation: pulse 4s infinite 2s;"></div>

  <div class="relative z-10 text-center px-6 max-w-5xl mx-auto">
    <!-- Pre-headline badge -->
    <div class="inline-flex items-center gap-2 glass rounded-full px-4 py-2 mb-8 text-sm font-display font-600 text-blue-300 glow-pill" data-aos="fade-down" data-aos-duration="800">
      <span class="w-2 h-2 rounded-full bg-cyan-400 animate-pulse"></span>
      <span x-text="t('hero.badge')"></span>
    </div>

    <!-- Name -->
    <h1 class="font-display font-800 text-white leading-none mb-4" style="font-size: clamp(3.5rem, 10vw, 8rem);" data-aos="fade-up" data-aos-duration="900" data-aos-delay="100">
      Kry <span class="grad-text">Luk</span>
    </h1>

    <!-- Tagline -->
    <p class="font-display text-blue-200/90 mb-4 font-600" style="font-size: clamp(1.1rem, 2.5vw, 1.6rem);" data-aos="fade-up" data-aos-duration="900" data-aos-delay="200">
      <span x-text="t('hero.tagline')"></span>
    </p>

    <!-- Subtitle -->
    <p class="text-slate-400 max-w-2xl mx-auto mb-10 leading-relaxed" style="font-size: clamp(0.95rem, 1.5vw, 1.1rem);" data-aos="fade-up" data-aos-duration="900" data-aos-delay="300">
      <span x-text="t('hero.subtitle')"></span>
    </p>

    <!-- CTAs -->
    <div class="flex flex-wrap gap-4 justify-center" data-aos="fade-up" data-aos-duration="900" data-aos-delay="400">
      <a href="#projects" class="btn-primary"><span x-text="t('hero.cta1')"></span></a>
      <a href="#contact" class="btn-outline"><span x-text="t('hero.cta2')"></span></a>
    </div>

    <!-- Scroll hint -->
    <div class="absolute bottom-8 left-1/2 -translate-x-1/2 flex flex-col items-center gap-2 text-slate-500" data-aos="fade-up" data-aos-delay="800">
      <span class="text-xs font-display tracking-widest uppercase" x-text="t('hero.scroll')"></span>
      <div class="w-px h-10 bg-gradient-to-b from-blue-500 to-transparent animate-pulse"></div>
    </div>
  </div>
</section>


<!-- ═══════════════════════════════════════════════════
     3. ABOUT ME
═══════════════════════════════════════════════════ -->
<section id="about" class="py-28 dots-bg dark:bg-slate-950/50 relative">
  <div class="max-w-6xl mx-auto px-6">
    <div class="grid md:grid-cols-2 gap-16 items-center">

        <div class="relative rounded-3xl overflow-hidden shadow-2xl shadow-blue-900/20">
          <img src="https://picsum.photos/id/1005/600/700" alt="[YOUR FULL NAME]" class="w-full object-cover" style="height: 520px;" />
          <div class="absolute inset-0 bg-gradient-to-t from-blue-900/40 to-transparent"></div>
        </div>
        <!-- Floating badge -->
        <div class="absolute -bottom-6 -right-6 glass rounded-2xl p-4 shadow-xl" data-aos="zoom-in" data-aos-delay="300">
          <div class="font-display font-800 text-3xl grad-text">[X]+</div>
          <div class="text-xs text-slate-500 dark:text-slate-400 mt-1" x-text="t('about.years')"></div>
        </div>
        <!-- Corner accent -->
        <div class="absolute -top-4 -left-4 w-20 h-20 rounded-2xl border-2 border-blue-500/30 rotate-12"></div>
      </div>

      <!-- Text side -->
      <div data-aos="fade-left" data-aos-duration="900" data-aos-delay="150">
        <p class="font-display text-sm font-600 text-brand-500 tracking-widest uppercase mb-3" x-text="t('about.label')"></p>
        <h2 class="font-display font-800 text-4xl dark:text-white text-slate-800 mb-6 section-heading" x-text="t('about.heading')"></h2>
        <div class="space-y-4 text-slate-600 dark:text-slate-300 leading-relaxed">
          <p x-text="t('about.bio1')"></p>
          <p x-text="t('about.bio2')"></p>

        <!-- Tags -->
        <div class="flex flex-wrap gap-2 mt-8">
          <template x-for="tag in t('about.tags')" :key="tag">

        <div class="mt-8">
          <a href="#contact" class="btn-primary inline-block"><span x-text="t('about.cta')"></span></a>

</section>


<!-- ═══════════════════════════════════════════════════
     4. SKILLS
═══════════════════════════════════════════════════ -->
<section id="skills" class="py-28 dark:bg-slate-900/60 bg-white/60">
  <div class="max-w-6xl mx-auto px-6">
    <div class="text-center mb-16" data-aos="fade-up">
      <p class="font-display text-sm font-600 text-brand-500 tracking-widest uppercase mb-3" x-text="t('skills.label')"></p>
      <h2 class="font-display font-800 text-4xl dark:text-white text-slate-800 inline-block section-heading" x-text="t('skills.heading')"></h2>
    </div>

    <div class="grid md:grid-cols-2 gap-x-16 gap-y-8"
         x-data="{ visible: false }"
         x-intersect="visible = true">
      <template x-for="(skill, i) in skills" :key="i">
        <div data-aos="fade-up" :data-aos-delay="i * 80">
          <div class="flex justify-between mb-2">
            <span class="font-display font-600 text-sm dark:text-slate-200 text-slate-700" x-text="skill.name[lang]"></span>
            <span class="font-display font-600 text-sm text-brand-500" x-text="skill.pct + '%'"></span>
          </div>
          <div class="progress-track">
            <div class="progress-fill"
                 :style="visible ? 'width:' + skill.pct + '%' : 'width:0'"
                 :style="'width:' + (visible ? skill.pct : 0) + '%'"></div>
          </div>
        </div>
      </template>
    </div>
  </div>
</section>


<!-- ═══════════════════════════════════════════════════
     5. INTERESTS & PASSIONS
═══════════════════════════════════════════════════ -->
<section id="interests" class="py-28 dots-bg dark:bg-slate-950/60">
  <div class="max-w-6xl mx-auto px-6">
    <div class="text-center mb-16" data-aos="fade-up">
      <p class="font-display text-sm font-600 text-brand-500 tracking-widest uppercase mb-3" x-text="t('interests.label')"></p>
      <h2 class="font-display font-800 text-4xl dark:text-white text-slate-800 inline-block section-heading" x-text="t('interests.heading')"></h2>
    </div>

    <div class="grid sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
      <template x-for="(interest, i) in interests" :key="i">
        <div
          class="glass rounded-2xl p-6 card-hover cursor-default relative overflow-hidden group"
          :data-aos="'fade-up'"
          :data-aos-delay="i * 70"
        >
          <!-- BG gradient accent -->
          <div class="absolute inset-0 opacity-0 group-hover:opacity-100 transition-opacity duration-500"
               :style="'background: radial-gradient(circle at 80% 80%, ' + interest.color + '20, transparent 70%)'"></div>

          <div class="relative z-10">
            <div class="text-4xl mb-4 icon-glow" x-text="interest.emoji"></div>
            <h3 class="font-display font-700 text-base dark:text-white text-slate-800 mb-2" x-text="interest.name[lang]"></h3>
            <p class="text-sm text-slate-500 dark:text-slate-400 leading-relaxed" x-text="interest.desc[lang]"></p>

            <!-- Special: Gaming -->
            <template x-if="interest.id === 'gaming'">
              <div class="mt-4 glass rounded-xl p-2.5 text-xs text-slate-400">
                🎮 <span x-text="t('interests.playing')"></span>: <span class="text-brand-400 font-600">[CURRENT GAME]</span>
              </div>
            </template>

            <!-- Special: Music -->
            <template x-if="interest.id === 'music'">
              <div class="mt-4 glass rounded-xl p-2.5 text-xs text-slate-400">
                🎵 <span x-text="t('interests.listening')"></span>: <span class="text-brand-400 font-600">[CURRENT ARTIST]</span>
              </div>
            </template>
          </div>
        </div>
      </template>
    </div>
  </div>
</section>


<!-- ═══════════════════════════════════════════════════
     6. CD COLLECTION
═══════════════════════════════════════════════════ -->
<section id="collection" class="py-28 dark:bg-slate-900/60 bg-slate-50/80"
  x-data="{ lightbox: null }">

function app() {

    toggleDark() {
      this.darkMode = !this.darkMode;
      localStorage.setItem('kl_dark', this.darkMode);
      document.documentElement.classList.toggle('dark', this.darkMode);
    },

    t(key) {
      const keys = key.split('.');
      let obj = this.i18n[this.lang];
      for (const k of keys) obj = obj?.[k];
      return obj ?? key;

    init() {
      document.documentElement.classList.toggle('dark', this.darkMode);
      this.$watch('lang', v => localStorage.setItem('kl_lang', v));

// ── Particles Canvas ─────────────────────────────────
(function () {
  const canvas  = document.getElementById('particles-canvas');
  const ctx     = canvas.getContext('2d');
  let W, H, particles, animId;

  function resize() {
    W = canvas.width  = canvas.offsetWidth;
    H = canvas.height = canvas.offsetHeight;
  }

  function Particle() {
    this.x  = Math.random() * W;
    this.y  = Math.random() * H;
    this.vx = (Math.random() - 0.5) * 0.4;
    this.vy = (Math.random() - 0.5) * 0.4;
    this.r  = Math.random() * 1.8 + 0.6;
    this.alpha = Math.random() * 0.5 + 0.2;
  }

  Particle.prototype.update = function () {
    this.x += this.vx;
    this.y += this.vy;
    if (this.x < 0 || this.x > W) this.vx *= -1;
    if (this.y < 0 || this.y > H) this.vy *= -1;
  };

  function init() {
    resize();
    const count = Math.min(120, Math.floor(W * H / 8000));
    particles = Array.from({ length: count }, () => new Particle());
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // Draw connections
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 130) {
          const opacity = (1 - dist / 130) * 0.25;
          ctx.beginPath();
          ctx.strokeStyle = `rgba(99,179,255,${opacity})`;
          ctx.lineWidth = 0.8;
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.stroke();
        }
      }
    }

    // Draw dots
    particles.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(147,197,255,${p.alpha})`;
      ctx.fill();
      p.update();
    });

    animId = requestAnimationFrame(draw);
  }

  init();
  draw();
  window.addEventListener('resize', () => { init(); });
})();


// ── AOS Init ─────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  AOS.init({
    duration: 800,
    easing: 'ease-out-cubic',
    once: true,
    offset: 80,
  });

  // Skill progress bars – re-trigger via intersection observer
  const skillSection = document.getElementById('skills');
  const barObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        document.querySelectorAll('.progress-fill').forEach((bar, i) => {
          const pct = [85, 78, 70, 82, 65, 90, 95, 60][i] || 70;
          setTimeout(() => {
            bar.style.width = pct + '%';
          }, i * 100);
        });
      }
    });
  }, { threshold: 0.2 });

  if (skillSection) barObserver.observe(skillSection);
});

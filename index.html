<html lang="en" class="scroll-smooth">
<head>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />

  <!-- Alpine.js -->

  <!-- AOS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" />
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>

  <!-- Vanilla Tilt -->
  <script src="https://cdn.jsdelivr.net/npm/vanilla-tilt@1.8.1/dist/vanilla-tilt.min.js"></script>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            display: ['Syne', 'sans-serif'],
            body:    ['DM Sans', 'sans-serif'],
          },
          colors: {
            brand: {
              50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe',
              300: '#93c5fd', 400: '#60a5fa', 500: '#3b82f6',
              600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a8a',
            }
          }
        }
      }
    }
  </script>

  <style>
    /* ═══ CSS VARIABLES ═══════════════════════════════════ */
    :root {
      --blue-start:   #1E40AF;
      --blue-mid:     #3B82F6;
      --cyan:         #06B6D4;
      --neon:         #00F5FF;
      --purple:       #7C3AED;
      --glow:         rgba(59,130,246,0.35);
      --neon-glow:    rgba(0,245,255,0.25);
      /* Mouse-follow gradient – updated by JS */
      --mx: 50%;
      --my: 50%;
    }

    * { box-sizing: border-box; }
    html { font-family: 'DM Sans', sans-serif; }

    /* ── HIDE SYSTEM CURSOR ── */
    *, *::before, *::after { cursor: none !important; }

    /* ── BODY ── */
    body {
      background: #f8fafc;
      color: #1e293b;
      transition: background 0.4s, color 0.4s;
      overflow-x: hidden;
    }
    html.dark body { background: #060b12; color: #e2e8f0; }

    /* ═══ MOUSE-FOLLOW RADIAL OVERLAY ═══════════════════ */
    #mouse-aura {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      background: radial-gradient(
        600px circle at var(--mx) var(--my),
        rgba(0,245,255,0.045) 0%,
        rgba(59,130,246,0.03) 35%,
        rgba(124,58,237,0.015) 65%,
        transparent 100%
      );
      transition: background 0.08s linear;
    }
    html.dark #mouse-aura {
      background: radial-gradient(
        600px circle at var(--mx) var(--my),
        rgba(0,245,255,0.06) 0%,
        rgba(59,130,246,0.04) 35%,
        rgba(124,58,237,0.02) 65%,
        transparent 100%
      );
    }

    /* ═══ CUSTOM SVG CURSOR ═════════════════════════════ */
    #kl-cursor {
      position: fixed;
      top: 0; left: 0;
      width: 20px; height: 26px;
      pointer-events: none;
      z-index: 9999;
      will-change: transform;
      transition: width 0.2s ease, height 0.2s ease, filter 0.2s ease, opacity 0.2s ease;
    }
    /* Hover: slight size bump + stronger glow */
    body.cur-hover #kl-cursor {
      width: 24px; height: 31px;
      filter: drop-shadow(0 0 4px rgba(0,245,255,0.9)) drop-shadow(0 0 10px rgba(0,245,255,0.4));
    }
    /* Click: slight shrink */
    body.cur-click #kl-cursor {
      width: 17px; height: 22px;
      filter: drop-shadow(0 0 6px rgba(0,245,255,1));
    }

    /* ═══ CURSOR TRAIL SPARKS ════════════════════════════ */
    .cursor-spark {
      position: fixed;
      pointer-events: none;
      z-index: 9998;
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(1);
      animation: spark-fade 0.7s ease-out forwards;
    }
    @keyframes spark-fade {
      0%   { opacity: 1;   transform: translate(-50%, -50%) scale(1); }
      40%  { opacity: 0.6; transform: translate(-50%, calc(-50% - 7px)) scale(0.65); }
      100% { opacity: 0;   transform: translate(-50%, calc(-50% - 16px)) scale(0.15); }
    }

    /* ═══ GLASSMORPHISM – NEON ENHANCED ═════════════════ */
    .glass {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(22px) saturate(180%);
      -webkit-backdrop-filter: blur(22px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.18);
    }
    .dark .glass {
      background: rgba(6,11,18,0.6);
      border: 1px solid rgba(0,245,255,0.08);
      box-shadow: 0 0 0 1px rgba(0,245,255,0.05), inset 0 1px 0 rgba(255,255,255,0.04);
    }
    /* Neon glass variant for cards */
    .glass-neon {
      background: rgba(6,11,18,0.55);
      backdrop-filter: blur(24px) saturate(160%);
      -webkit-backdrop-filter: blur(24px) saturate(160%);
      border: 1px solid rgba(0,245,255,0.18);
      box-shadow:
        0 0 0 1px rgba(0,245,255,0.1),
        0 8px 32px rgba(0,0,0,0.4),
        inset 0 1px 0 rgba(0,245,255,0.08),
        0 0 40px rgba(0,245,255,0.04);
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .glass-neon:hover {
      border-color: rgba(0,245,255,0.35);
      box-shadow:
        0 0 0 1px rgba(0,245,255,0.2),
        0 12px 48px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(0,245,255,0.12),
        0 0 60px rgba(0,245,255,0.08);
    }

    /* ═══ GRADIENT TEXT ══════════════════════════════════ */
    .grad-text {
      background: linear-gradient(135deg, #3B82F6 0%, #00F5FF 50%, #7C3AED 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ═══ BUTTONS ════════════════════════════════════════ */
    .btn-primary {
      background: linear-gradient(135deg, #1E40AF 0%, #3B82F6 50%, #00C4D4 100%);
      color: #fff;
      border-radius: 50px;
      padding: 0.75rem 2rem;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      letter-spacing: 0.04em;
      transition: all 0.3s ease;
      box-shadow: 0 4px 24px rgba(59,130,246,0.4), 0 0 0 0 rgba(0,245,255,0);
      position: relative;
      overflow: hidden;
      display: inline-block;
    }
    .btn-primary::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, #7C3AED 0%, #00F5FF 100%);
      opacity: 0; transition: opacity 0.3s;
    }
    .btn-primary:hover {
      box-shadow: 0 6px 32px rgba(0,245,255,0.45), 0 0 60px rgba(0,245,255,0.12);
    }
    .btn-primary:hover::before { opacity: 1; }
    .btn-primary span { position: relative; z-index: 1; }

    .btn-outline {
      border: 1.5px solid rgba(0,245,255,0.5);
      color: #00F5FF;
      border-radius: 50px;
      padding: 0.75rem 2rem;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      letter-spacing: 0.04em;
      transition: all 0.3s ease;
      box-shadow: 0 0 0 0 rgba(0,245,255,0), inset 0 0 0 0 rgba(0,245,255,0);
      display: inline-block;
      position: relative;
    }
    .btn-outline:hover {
      background: rgba(0,245,255,0.08);
      border-color: rgba(0,245,255,0.8);
      box-shadow: 0 0 20px rgba(0,245,255,0.25), inset 0 0 20px rgba(0,245,255,0.05);
      color: #fff;
    }

    /* ═══ MAGNETIC WRAPPER (set by JS) ══════════════════ */
    .magnetic { position: relative; }

    /* ═══ HERO CANVAS ════════════════════════════════════ */
    #particles-canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    /* ═══ PROGRESS BARS ══════════════════════════════════ */
    .progress-track {
      background: rgba(0,245,255,0.07);
      border: 1px solid rgba(0,245,255,0.1);
      border-radius: 100px;
      height: 8px; overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 100px;
      background: linear-gradient(90deg, #1E40AF, #3B82F6, #00F5FF);
      width: 0;
      transition: width 1.4s cubic-bezier(0.22, 0.61, 0.36, 1);
      box-shadow: 0 0 12px rgba(0,245,255,0.5), 0 0 4px rgba(0,245,255,0.8);
    }

    /* ═══ TIMELINE ═══════════════════════════════════════ */
    .timeline-item::before {
      content: '';
      position: absolute;
      left: -1px; top: 0; bottom: 0; width: 2px;
      background: linear-gradient(180deg, #00F5FF, #3B82F6, transparent);
    }

    /* ═══ CARD HOVER ═════════════════════════════════════ */
    .card-hover {
      transition: transform 0.35s cubic-bezier(0.22,0.61,0.36,1), box-shadow 0.35s;
    }
    .card-hover:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 20px 60px rgba(0,245,255,0.12), 0 4px 20px rgba(59,130,246,0.2);
    }

    /* ═══ MASONRY ════════════════════════════════════════ */
    .masonry { columns: 2; column-gap: 1rem; }
    @media (min-width: 640px)  { .masonry { columns: 3; } }
    @media (min-width: 1024px) { .masonry { columns: 4; } }
    .masonry-item { break-inside: avoid; margin-bottom: 1rem; }

    /* ═══ MODAL ══════════════════════════════════════════ */
    .modal-backdrop {
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(12px);
    }

    /* ═══ SCROLLBAR ══════════════════════════════════════ */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: linear-gradient(180deg,#3B82F6,#00F5FF); border-radius: 2px; }

    /* ═══ SECTION HEADING ════════════════════════════════ */
    .section-heading::after {
      content: '';
      display: block; width: 60px; height: 3px;
      background: linear-gradient(90deg, #3B82F6, #00F5FF);
      border-radius: 2px; margin-top: 0.5rem;
    }

    /* ═══ DOTS BG ════════════════════════════════════════ */
    .dots-bg {
      background-image: radial-gradient(rgba(0,245,255,0.08) 1px, transparent 1px);
      background-size: 28px 28px;
    }

    /* ═══ GLOW PILL ══════════════════════════════════════ */
    .glow-pill {
      box-shadow: 0 0 0 1px rgba(0,245,255,0.2), 0 0 20px rgba(0,245,255,0.1);
    }

    /* ═══ ICON GLOW ══════════════════════════════════════ */
    .icon-glow { filter: drop-shadow(0 0 12px rgba(0,245,255,0.5)); }

    /* ═══ CD CARD ════════════════════════════════════════ */
    .cd-card {
      position: relative; overflow: hidden;
      border-radius: 12px;
    }
    .cd-card img { transition: transform 0.5s cubic-bezier(0.22,0.61,0.36,1); width: 100%; display: block; }
    .cd-card:hover img { transform: scale(1.06); }
    .cd-card .cd-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(4,10,24,0.9) 0%, transparent 55%);
      opacity: 0; transition: opacity 0.3s;
      display: flex; align-items: flex-end; padding: 0.75rem;
    }
    .cd-card:hover .cd-overlay { opacity: 1; }

    /* Vanilla-tilt shine */
    .js-tilt-glare-wrap { overflow: hidden; border-radius: inherit; }
    .js-tilt-glare {
      background: linear-gradient(0deg, rgba(255,255,255,0) 0%, rgba(0,245,255,0.08) 100%) !important;
    }

    /* ═══ NOISE OVERLAY ══════════════════════════════════ */
    .noise::after {
      content: ''; position: absolute; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none; mix-blend-mode: overlay; z-index: 1;
    }

    /* ═══ LANGUAGE BUTTONS ═══════════════════════════════ */
    .lang-btn { font-size: 1.25rem; line-height: 1; transition: transform 0.2s, opacity 0.2s; opacity: 0.55; }
    .lang-btn.active { opacity: 1; transform: scale(1.2); }

    /* ═══ NEON NAVBAR BORDER ══════════════════════════════ */
    nav.scrolled-glass {
      box-shadow: 0 1px 0 rgba(0,245,255,0.12), 0 8px 40px rgba(0,0,0,0.4);
      border-bottom: 1px solid rgba(0,245,255,0.07);
    }

    html { scroll-behavior: smooth; }
  </style>
</head>

<body
  x-data="app()"

  class="font-body"
>

<!-- Mouse-follow aura overlay -->
<div id="mouse-aura" aria-hidden="true"></div>

<!-- ═══ CUSTOM THEMED CURSOR ═══════════════════════════
     Clean arrow pointer. Neon cyan→blue→purple stroke,
     soft translucent gradient fill, no tip dot.
     viewBox 0 0 14 20  |  rendered 20×26 px
══════════════════════════════════════════════════════ -->
<svg id="kl-cursor" viewBox="0 0 14 20" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <defs>
    <!-- Body fill: semi-transparent cyan→blue wash -->
    <linearGradient id="cur-fill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#00F5FF" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0.10"/>
    </linearGradient>
    <!-- Stroke gradient: cyan tip → blue → purple tail -->
    <linearGradient id="cur-stroke" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0%"   stop-color="#00F5FF"/>
      <stop offset="55%"  stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="cur-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!--
    Clean arrow path — tip at (1,1), hotspot top-left:
    Down the left edge → inner notch → tail spike → close via diagonal
  -->
  <path
    d="M 1,1 L 1,16 L 5,12 L 8,19 L 10,18 L 7,11 L 12,11 Z"
    fill="url(#cur-fill)"
    stroke="url(#cur-stroke)"
    stroke-width="1.2"
    stroke-linejoin="round"
    stroke-linecap="round"
    filter="url(#cur-glow)"
  />
</svg>

<nav

  <div x-show="mobileOpen"

       x-transition:leave="transition ease-in duration-150" x-transition:leave-end="opacity-0 -translate-y-4"
       class="md:hidden glass-neon mt-2 mx-4 rounded-2xl p-4">
    <template x-for="link in nav.links" :key="link.id">
      <a :href="'#'+link.id" @click="mobileOpen = false"
         class="block py-3 px-4 font-display font-600 text-sm dark:text-slate-200 text-slate-700 hover:text-cyan-400 transition-colors border-b border-cyan-400/10 last:border-0"
         x-text="link[lang]"></a>
    </template>
  </div>
</nav>

/* ════════════════════════════════════════════════════
   1. CUSTOM SVG CURSOR + SPARK TRAIL
════════════════════════════════════════════════════ */
(function () {
  const cur = document.getElementById('kl-cursor');
  if (!cur) return;

  let mx = 0, my = 0;        // real mouse position
  let cx = 0, cy = 0;        // current cursor element position (lerped)
  const LERP = 0.78;          // higher = snappier (cursor should feel native-fast)

  /* ── Smooth follow ── */
  document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

  function animateCursor() {
    cx += (mx - cx) * LERP;
    cy += (my - cy) * LERP;
    cur.style.transform = `translate(${cx}px, ${cy}px)`;
    requestAnimationFrame(animateCursor);
  }
  animateCursor();

  /* ── Hide / show on window leave / enter ── */
  document.addEventListener('mouseleave', () => cur.style.opacity = '0');
  document.addEventListener('mouseenter', () => cur.style.opacity = '1');

  /* ── Hover state: scale + glow upgrade ── */
  const HOVER_SEL = 'a, button, .btn-primary, .btn-outline, .cd-card, .tilt-card, .interest-card, [role="button"], input, textarea, select, label';
  document.addEventListener('mouseover', e => {
    if (e.target.closest(HOVER_SEL)) document.body.classList.add('cur-hover');
  });
  document.addEventListener('mouseout', e => {
    if (e.target.closest(HOVER_SEL)) document.body.classList.remove('cur-hover');
  });

  /* ── Click: momentary shrink ── */
  document.addEventListener('mousedown', () => {
    document.body.classList.add('cur-click');
    setTimeout(() => document.body.classList.remove('cur-click'), 180);
  });

  /* ══════════════════════════════════════════════════
     SPARK TRAIL
     Spawns tiny glowing sparks at the cursor hotspot.
     Colour palette rotates: cyan → blue → purple.
  ══════════════════════════════════════════════════ */
  const COLOURS = [
    { bg: 'rgba(0,245,255,0.85)',   shadow: '0 0 6px 2px rgba(0,245,255,0.7)'  },
    { bg: 'rgba(59,130,246,0.80)',  shadow: '0 0 6px 2px rgba(59,130,246,0.6)' },
    { bg: 'rgba(124,58,237,0.75)',  shadow: '0 0 6px 2px rgba(124,58,237,0.6)' },
    { bg: 'rgba(0,200,220,0.70)',   shadow: '0 0 5px 2px rgba(0,200,220,0.5)'  },
  ];
  const SIZES = [4, 5, 3, 6, 4, 3, 5];
  let colIdx = 0, sizeIdx = 0;
  let lastX = 0, lastY = 0, moveCount = 0;

  /* DOM pool – 28 nodes, reused to avoid GC pressure */
  const POOL_SIZE = 28;
  const pool = [];
  for (let i = 0; i < POOL_SIZE; i++) {
    const el = document.createElement('div');
    el.className = 'cursor-spark';
    el.style.display = 'none';
    document.body.appendChild(el);
    pool.push({ el, active: false });
  }

  function spawnSpark(x, y) {
    const spark = pool.find(s => !s.active);
    if (!spark) return;

    const c    = COLOURS[colIdx  % COLOURS.length];
    const size = SIZES[sizeIdx   % SIZES.length];
    colIdx++; sizeIdx++;
    spark.active = true;

    const ox = (Math.random() - 0.5) * 10;
    const oy = (Math.random() - 0.5) * 6;

    const el = spark.el;
    el.style.cssText = `
      display: block;
      left: ${x + ox}px;
      top:  ${y + oy}px;
      width:  ${size}px;
      height: ${size}px;
      background: ${c.bg};
      box-shadow: ${c.shadow};
      animation: none;
    `;
    void el.offsetWidth; // reflow
    el.style.animation = 'spark-fade 0.65s ease-out forwards';
    setTimeout(() => { el.style.display = 'none'; spark.active = false; }, 680);
  }

  document.addEventListener('mousemove', e => {
    const dx = e.clientX - lastX;
    const dy = e.clientY - lastY;
    moveCount += Math.sqrt(dx * dx + dy * dy);
    if (moveCount >= 10) {
      moveCount = 0;
      spawnSpark(e.clientX, e.clientY);
    }
    lastX = e.clientX;
    lastY = e.clientY;
  });
})();


/* ════════════════════════════════════════════════════
   2. MOUSE-FOLLOW GRADIENT AURA
════════════════════════════════════════════════════ */
(function () {
  let tx = 50, ty = 50, cx = 50, cy = 50;
  document.addEventListener('mousemove', e => {
    tx = (e.clientX / window.innerWidth)  * 100;
    ty = (e.clientY / window.innerHeight) * 100;
  });
  function update() {
    cx += (tx - cx) * 0.06;
    cy += (ty - cy) * 0.06;
    document.documentElement.style.setProperty('--mx', cx + '%');
    document.documentElement.style.setProperty('--my', cy + '%');
    requestAnimationFrame(update);
  }
  update();
})();


/* ════════════════════════════════════════════════════
   3. MAGNETIC BUTTONS
════════════════════════════════════════════════════ */
(function () {
  const STRENGTH = 0.38;
  const RADIUS   = 80;

  function initMagnetic(el) {
    el.addEventListener('mousemove', e => {
      const r   = el.getBoundingClientRect();
      const cx  = r.left + r.width  / 2;
      const cy  = r.top  + r.height / 2;
      const dx  = e.clientX - cx;
      const dy  = e.clientY - cy;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < RADIUS) {
        const pull = (1 - dist / RADIUS) * STRENGTH;
        el.style.transform = `translate(${dx * pull}px, ${dy * pull}px)`;
      }
    });
    el.addEventListener('mouseleave', () => {
      el.style.transition = 'transform 0.5s cubic-bezier(0.22,0.61,0.36,1)';
      el.style.transform  = 'translate(0,0)';
      setTimeout(() => { el.style.transition = ''; }, 500);
    });
  }

  // Run after Alpine renders
  document.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
      document.querySelectorAll('.magnetic').forEach(initMagnetic);
    }, 600);
  });

  // Also watch for DOM mutations (Alpine x-for)
  const observer = new MutationObserver(() => {
    document.querySelectorAll('.magnetic:not([data-magnetic])').forEach(el => {
      el.setAttribute('data-magnetic', '1');
      initMagnetic(el);
    });
  });
  observer.observe(document.body, { childList: true, subtree: true });
})();


/* ════════════════════════════════════════════════════
   4. VANILLA-TILT – INIT ON TILT CARDS & CD COVERS
════════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  function initTilt() {
    // Project cards
    VanillaTilt.init(document.querySelectorAll('.tilt-card'), {
      max: 6, speed: 500, glare: true, 'max-glare': 0.10, perspective: 1200,
    });
    // CD covers – re-run since Alpine renders them after DOMContentLoaded
    VanillaTilt.init(document.querySelectorAll('.cd-card'), {
      max: 8, speed: 400, glare: true, 'max-glare': 0.12, perspective: 1000,
    });
  }

  setTimeout(initTilt, 800); // wait for Alpine x-for render

  // Also init when new elements appear
  const to = new MutationObserver(() => {
    document.querySelectorAll('.cd-card:not([data-tilt-init]),.tilt-card:not([data-tilt-init])').forEach(el => {
      VanillaTilt.init([el], {
        max: el.classList.contains('cd-card') ? 8 : 6,
        speed: 400, glare: true, 'max-glare': 0.12, perspective: 1000,
      });
    });
  });
  to.observe(document.body, { childList: true, subtree: true });
});


/* ════════════════════════════════════════════════════
   5. HERO PARTICLES – MOUSE REPEL / ATTRACT
════════════════════════════════════════════════════ */
(function () {
  const canvas = document.getElementById('particles-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  let W, H, particles;

  // Mouse position (relative to canvas)
  let mouseX = -9999, mouseY = -9999;
  let heroEl = document.getElementById('hero');
  document.addEventListener('mousemove', e => {
    if (!heroEl) return;
    const r = heroEl.getBoundingClientRect();
    mouseX = e.clientX - r.left;
    mouseY = e.clientY - r.top;
  });
  document.addEventListener('mouseleave', () => { mouseX = -9999; mouseY = -9999; });

  function resize() {
    W = canvas.width  = canvas.offsetWidth;
    H = canvas.height = canvas.offsetHeight;
  }

  function Particle() {
    this.x    = Math.random() * W;
    this.y    = Math.random() * H;
    this.ox   = this.x; // origin x (for gentle return)
    this.oy   = this.y;
    this.vx   = (Math.random() - 0.5) * 0.35;
    this.vy   = (Math.random() - 0.5) * 0.35;
    this.r    = Math.random() * 1.8 + 0.6;
    this.alpha= Math.random() * 0.55 + 0.2;
    // Randomly repel or attract
    this.mode = Math.random() > 0.4 ? 'repel' : 'attract';
  }

  Particle.prototype.update = function () {
    const REPEL_R  = 120;
    const REPEL_F  = 1.2;
    const ATTRACT_R = 180;
    const ATTRACT_F = 0.35;
    const DAMPING  = 0.88;

    const dx   = this.x - mouseX;
    const dy   = this.y - mouseY;
    const dist = Math.sqrt(dx * dx + dy * dy) || 1;

    if (this.mode === 'repel' && dist < REPEL_R) {
      const force = (1 - dist / REPEL_R) * REPEL_F;
      this.vx += (dx / dist) * force;
      this.vy += (dy / dist) * force;
    }
    if (this.mode === 'attract' && dist < ATTRACT_R && dist > 30) {
      const force = (1 - dist / ATTRACT_R) * ATTRACT_F;
      this.vx -= (dx / dist) * force;
      this.vy -= (dy / dist) * force;
    }

    // Gentle drift back toward origin
    this.vx += (this.ox - this.x) * 0.002;
    this.vy += (this.oy - this.y) * 0.002;

    // Damping
    this.vx *= DAMPING;
    this.vy *= DAMPING;

    this.x += this.vx;
    this.y += this.vy;

    // Soft bounds
    if (this.x < 0) { this.x = 0; this.vx *= -0.5; }
    if (this.x > W) { this.x = W; this.vx *= -0.5; }
    if (this.y < 0) { this.y = 0; this.vy *= -0.5; }
    if (this.y > H) { this.y = H; this.vy *= -0.5; }
  };

  function init() {
    resize();
    const count = Math.min(130, Math.floor(W * H / 7000));
    particles = Array.from({ length: count }, () => new Particle());
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // Connections
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx   = particles[i].x - particles[j].x;
        const dy   = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 140) {
          const opacity = (1 - dist / 140) * 0.22;
          ctx.beginPath();
          ctx.strokeStyle = `rgba(0,245,255,${opacity})`;
          ctx.lineWidth = 0.7;
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.stroke();
        }
      }
    }

    // Dots with glow
    particles.forEach(p => {
      // Outer glow
      const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 4);
      g.addColorStop(0,   `rgba(0,245,255,${p.alpha})`);
      g.addColorStop(0.4, `rgba(0,200,255,${p.alpha * 0.4})`);
      g.addColorStop(1,   'rgba(0,245,255,0)');
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * 4, 0, Math.PI * 2);
      ctx.fillStyle = g;
      ctx.fill();

      // Core dot
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(180,240,255,${p.alpha})`;
      ctx.fill();

      p.update();
    });

    // Subtle mouse aura on canvas
    if (mouseX > 0) {
      const mg = ctx.createRadialGradient(mouseX, mouseY, 0, mouseX, mouseY, 80);
      mg.addColorStop(0, 'rgba(0,245,255,0.04)');
      mg.addColorStop(1, 'rgba(0,245,255,0)');
      ctx.beginPath();
      ctx.arc(mouseX, mouseY, 80, 0, Math.PI * 2);
      ctx.fillStyle = mg;
      ctx.fill();
    }

    requestAnimationFrame(draw);
  }

  init();
  draw();
  window.addEventListener('resize', init);
})();


/* ════════════════════════════════════════════════════
   6. INTEREST CARDS – HOVER-ONLY 3D TILT
   Cards only move when hovered (via VanillaTilt).
   No global parallax – avoids the "some cards stuck"
   bug caused by competing transforms.
════════════════════════════════════════════════════ */
(function () {
  function initInterestTilt() {
    document.querySelectorAll('.interest-card:not([data-tilt-init])').forEach(el => {
      VanillaTilt.init([el], {
        max:           10,
        speed:         350,
        glare:         true,
        'max-glare':   0.08,
        perspective:   900,
        scale:         1.04,
        reset:         true,     // snap back on mouse-leave
      });
    });
  }

  // Run once after Alpine has rendered the x-for list
  document.addEventListener('DOMContentLoaded', () => {
    setTimeout(initInterestTilt, 700);
  });

  // Catch any late DOM additions
  const obs = new MutationObserver(initInterestTilt);
  obs.observe(document.body, { childList: true, subtree: true });
})();


/* ════════════════════════════════════════════════════
   7. SKILL PROGRESS BARS
════════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  AOS.init({ duration: 800, easing: 'ease-out-cubic', once: true, offset: 80 });

  const PCT = [85, 78, 70, 82, 65, 90, 95, 60];
  const skillSection = document.getElementById('skills');

  const obs = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        document.querySelectorAll('.progress-fill').forEach((bar, i) => {
          setTimeout(() => { bar.style.width = (PCT[i] || 70) + '%'; }, i * 100);
        });
        obs.disconnect();
      }
    });
  }, { threshold: 0.2 });

  if (skillSection) obs.observe(skillSection);
});
</script>
</body>
